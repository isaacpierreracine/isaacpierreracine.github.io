{{ $id := .Get "id" }}
{{ $img := .Get "img" | default "image01.jpg" }}
{{ $instance := .Get "instance" | default "peertube.wtf" }}
{{ $full := .Get "full" | default "false" }}

{{ if eq $full "true" }}
<div style="display: flex; justify-content: center; margin: 16px 0;">
  <div style="position: relative; width: 100%; padding-bottom: 56.25%; height: 0; overflow: hidden;">
    <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://{{ $instance }}/videos/embed/{{ $id }}" frameborder="0" allowfullscreen></iframe>
  </div>
</div>
{{ else }}
<div style="display: flex; justify-content: center; margin: 16px 0;">
  <div id="pt-{{ $id }}-thumb" style="width: 160px; cursor: pointer; position: relative;" onclick="ptPlay('{{ $id }}', '{{ $instance }}')">
    <img src="{{ $img }}" style="width: 160px; height: 90px; object-fit: cover; display: block;">
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2);">
      <div style="width: 44px; height: 44px; background: rgba(0,0,0,0.75); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <div style="width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 18px solid white; margin-left: 4px;"></div>
      </div>
    </div>
  </div>
  <div id="pt-{{ $id }}-player" style="display: none; flex-direction: column; align-items: center;">
    <iframe id="pt-{{ $id }}-iframe" width="560" height="315" src="" frameborder="0" allowfullscreen></iframe>
    <button onclick="ptClose('{{ $id }}')" style="margin-top: 8px; background: rgba(0,0,0,0.7); color: white; border: none; cursor: pointer; padding: 4px 12px; border-radius: 4px;">✕ Fermer</button>
  </div>
</div>
<script>
function ptPlay(id, instance) {
  document.getElementById('pt-' + id + '-thumb').style.display = 'none';
  var player = document.getElementById('pt-' + id + '-player');
  player.style.display = 'flex';
  document.getElementById('pt-' + id + '-iframe').src = 'https://' + instance + '/videos/embed/' + id + '?autoplay=1';
}
function ptClose(id) {
  document.getElementById('pt-' + id + '-thumb').style.display = 'block';
  var player = document.getElementById('pt-' + id + '-player');
  player.style.display = 'none';
  document.getElementById('pt-' + id + '-iframe').src = '';
}
</script>
{{ end }}
