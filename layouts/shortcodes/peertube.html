{{ $id := .Get "id" }}
{{ $img := .Get "img" | default "image01.jpg" }}
{{ $instance := .Get "instance" | default "peertube.wtf" }}
{{ $full := .Get "full" | default "false" }}
{{ if eq $full "true" }}
<div style="position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;margin:16px 0;">
<iframe style="position:absolute;top:0;left:0;width:100%;height:100%;" src="https://{{ $instance }}/videos/embed/{{ $id }}" frameborder="0" allowfullscreen></iframe>
</div>
{{ else }}
<span onclick="ptPlay('{{ $id }}','{{ $instance }}')" style="display:block;cursor:pointer;position:relative;aspect-ratio:16/9;"><img src="{{ $img }}" style="width:100%;height:100%;object-fit:cover;display:block;margin:0!important;"><span style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);"><span style="width:40px;height:40px;background:rgba(0,0,0,0.75);border-radius:50%;display:flex;align-items:center;justify-content:center;"><span style="width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:16px solid white;margin-left:4px;display:block;"></span></span></span></span>
<div id="pt-{{ $id }}-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;flex-direction:column;">
<iframe id="pt-{{ $id }}-iframe" width="800" height="450" src="" frameborder="0" allowfullscreen></iframe>
<button onclick="ptClose('{{ $id }}')" style="margin-top:12px;background:rgba(255,255,255,0.2);color:white;border:none;cursor:pointer;padding:6px 16px;border-radius:4px;font-size:14px;">✕ Fermer</button>
</div>
<script>
function ptPlay(id,instance){document.getElementById('pt-'+id+'-overlay').style.display='flex';document.getElementById('pt-'+id+'-iframe').src='https://'+instance+'/videos/embed/'+id+'?autoplay=1';}
function ptClose(id){document.getElementById('pt-'+id+'-overlay').style.display='none';document.getElementById('pt-'+id+'-iframe').src='';}
</script>
{{ end }}
